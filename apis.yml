aid: amazon-eventbridge-pipes
name: Amazon EventBridge Pipes
description: >-
  Amazon EventBridge Pipes helps you create point-to-point integrations between
  event producers and consumers with optional transform, filter, and enrich
  steps. It reduces the amount of integration code you need to write and
  maintain when building event-driven applications.
